<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>红橙果园 - 智慧大屏</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="logo-wrap">
        <div class="logo-icon">Y</div>
        <div class="logo-text">红橙果园</div>
      </div>
      <nav class="menu">
        <button class="menu-item is-active">概览分析</button>
        <a class="menu-item menu-link" href="/diagnosis">智能诊断</a>
        <a class="menu-item menu-link" href="/admin">管理后台</a>
        <a class="menu-item menu-link" href="/valve">阀门控制</a>
        <a class="menu-item menu-link" href="/yolo">视觉诊断</a>
      </nav>
      <button class="collapse-btn" id="collapseBtn">收起侧栏</button>
    </aside>

    <main class="screen">
      <header class="screen-title-wrap">
        <div class="screen-title">智慧果园数据可视化大屏</div>
      </header>

      <section class="screen-grid">
        <section class="panel panel-left">
          <div class="panel-header">
            <h3>最新小时传感器（10项）</h3>
            <p id="latestTimestamp">--</p>
          </div>
          <div class="metric-list" id="metricList"></div>
          <div class="chart-box" id="sensorRadarChart"></div>
        </section>

        <section class="panel panel-center">
          <div class="panel-header">
            <h3>区域总览与切换</h3>
            <p>默认区域：Zone_1</p>
          </div>
          <div class="zone-map-wrap">
            <svg id="zoneSvg" viewBox="0 0 640 320" preserveAspectRatio="xMidYMid meet">
              <defs>
                <linearGradient id="zoneFill" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#36d8ff" stop-opacity="0.34" />
                  <stop offset="100%" stop-color="#1a6bff" stop-opacity="0.22" />
                </linearGradient>
              </defs>

              <g class="zone-links">
                <path class="flow-line" d="M22 78 C 64 94, 106 122, 150 140" />
                <path class="flow-line" d="M338 18 C 332 56, 334 92, 338 132" />
                <path class="flow-line" d="M618 86 C 586 98, 554 122, 524 142" />
                <path class="flow-line" d="M22 282 C 64 272, 108 258, 164 246" />
                <path class="flow-line" d="M342 306 C 338 286, 340 264, 342 242" />
                <path class="flow-line" d="M618 292 C 584 282, 556 266, 532 252" />
              </g>

              <g class="zone-pulse">
                <circle class="pulse-ring" style="--d: 0s" cx="150" cy="140" r="6" />
                <circle class="pulse-ring" style="--d: .6s" cx="338" cy="132" r="6" />
                <circle class="pulse-ring" style="--d: 1.1s" cx="524" cy="142" r="6" />
                <circle class="pulse-ring" style="--d: .3s" cx="164" cy="246" r="6" />
                <circle class="pulse-ring" style="--d: .9s" cx="342" cy="242" r="6" />
                <circle class="pulse-ring" style="--d: 1.4s" cx="532" cy="252" r="6" />
              </g>

              <g class="zone-group" data-zone="zone_1" style="--float-delay: 0s">
                <polygon points="56,128 144,72 248,96 214,186 90,198" />
                <text x="150" y="140">Zone_1</text>
              </g>
              <g class="zone-group" data-zone="zone_2" style="--float-delay: .4s">
                <polygon points="248,96 340,56 434,96 386,172 260,168" />
                <text x="338" y="132">Zone_2</text>
              </g>
              <g class="zone-group" data-zone="zone_3" style="--float-delay: .8s">
                <polygon points="434,96 528,66 608,116 566,198 452,184" />
                <text x="524" y="142">Zone_3</text>
              </g>
              <g class="zone-group" data-zone="zone_4" style="--float-delay: 1.2s">
                <polygon points="100,202 214,188 254,256 164,286 80,246" />
                <text x="164" y="246">Zone_4</text>
              </g>
              <g class="zone-group" data-zone="zone_5" style="--float-delay: 1.6s">
                <polygon points="260,170 386,174 436,236 356,288 244,258" />
                <text x="342" y="242">Zone_5</text>
              </g>
              <g class="zone-group" data-zone="zone_6" style="--float-delay: 2s">
                <polygon points="452,188 566,202 620,260 534,296 426,252" />
                <text x="532" y="252">Zone_6</text>
              </g>

              <g class="zone-points">
                <circle class="sensor-dot" style="--d: 0s" cx="150" cy="140" r="3.1" />
                <circle class="sensor-dot" style="--d: .4s" cx="338" cy="132" r="3.1" />
                <circle class="sensor-dot" style="--d: .8s" cx="524" cy="142" r="3.1" />
                <circle class="sensor-dot" style="--d: 1.2s" cx="164" cy="246" r="3.1" />
                <circle class="sensor-dot" style="--d: 1.6s" cx="342" cy="242" r="3.1" />
                <circle class="sensor-dot" style="--d: 2s" cx="532" cy="252" r="3.1" />
              </g>
            </svg>
          </div>

          <div class="yolo-monitor-header">
            <div class="monitor-title-wrap">
              <span class="monitor-dot" aria-hidden="true"></span>
              <h3>空天实时巡检动态与预警</h3>
            </div>
            <a class="monitor-link" href="/yolo">进入视觉诊断中心 -></a>
          </div>
          <div class="yolo-table yolo-monitor-table" id="yoloTable"></div>
        </section>

        <section class="panel panel-right">
          <div class="panel-header">
            <h3>未来24小时预测与天气</h3>
            <p id="predictionHint">--</p>
          </div>
          <div class="chart-box right-big" id="predictChart"></div>
          <div class="quick-kpi" id="quickKpi"></div>
        </section>
      </section>
    </main>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
