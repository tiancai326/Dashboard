<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>红橙果园 - 智能诊断</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <style>
    .diag-screen {
      min-height: 100vh;
      padding: 12px 16px 16px;
      background:
        radial-gradient(circle at 22% 12%, rgba(8, 118, 255, 0.22), transparent 44%),
        radial-gradient(circle at 85% 18%, rgba(0, 229, 255, 0.16), transparent 40%),
        linear-gradient(135deg, #060d1f, #03142f);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .diag-header {
      border: 1px solid rgba(68, 165, 255, 0.38);
      border-radius: 12px;
      background: rgba(9, 31, 71, 0.76);
      box-shadow: inset 0 0 20px rgba(17, 121, 214, 0.2);
      padding: 12px 14px;
    }

    .diag-tip-title {
      margin: 0;
      font-size: 18px;
      color: #d8f4ff;
      letter-spacing: 0.5px;
    }

    .diag-tip-list {
      margin: 8px 0 0;
      padding-left: 18px;
      color: #9fd0f6;
      font-size: 14px;
      line-height: 1.45;
    }

    .diag-tip-list li {
      margin: 2px 0;
    }

    .chat-wrap {
      flex: 1 1 auto;
      min-height: 0;
      border: 1px solid rgba(80, 169, 255, 0.32);
      border-radius: 14px;
      background: rgba(7, 24, 58, 0.75);
      box-shadow: inset 0 0 24px rgba(17, 121, 214, 0.16);
      padding: 10px;
    }

    .chat-embed {
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 175px);
      border: 0;
      border-radius: 10px;
      background: #fff;
    }

    @media (max-width: 1300px) {
      .chat-embed {
        min-height: calc(100vh - 195px);
      }
    }
  </style>
</head>
<body>
  <div class="app-shell" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="logo-wrap">
        <div class="logo-icon">Y</div>
        <div class="logo-text">红橙果园</div>
      </div>
      <nav class="menu">
        <a class="menu-item menu-link" href="/">概览分析</a>
        <button class="menu-item is-active" type="button">智能诊断</button>
        <a class="menu-item menu-link" href="/admin">管理后台</a>
        <a class="menu-item menu-link" href="/valve">阀门控制</a>
        <a class="menu-item menu-link" href="/yolo">视觉诊断</a>
      </nav>
      <button class="collapse-btn" id="collapseBtn" type="button">收起侧栏</button>
    </aside>

    <main class="diag-screen">
      <header class="diag-header">
        <h1 class="diag-tip-title">提问建议</h1>
        <ul class="diag-tip-list">
          <li>可说明具体区域或者全部区域，例如：zone_3区域当前某个因素、土湿、EC或者全部因素的情况。</li>
          <li>可提问未来24小时的天气温度、湿度、ec、土壤温度、湿度的情况，给出对应的决策和建议</li>
          <li>让智能体全部分析给出对应的决策和建议</li>
        </ul>
      </header>

      <section class="chat-wrap">
        <iframe
          class="chat-embed"
          src="https://dify.mysolo.codes/chatbot/VvvBNdRfN7wc0oAm"
          allow="microphone"
          loading="lazy"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>
    </main>
  </div>

  <script>
    const appShell = document.getElementById("appShell");
    const collapseBtn = document.getElementById("collapseBtn");
    collapseBtn?.addEventListener("click", () => {
      appShell.classList.toggle("sidebar-collapsed");
    });
  </script>
</body>
</html>
